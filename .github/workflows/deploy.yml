name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          USE_CMS: ${{ secrets.USE_CMS }}
          NEXT_PUBLIC_USE_CMS: ${{ secrets.NEXT_PUBLIC_USE_CMS }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMPANY_EMAIL: ${{ secrets.COMPANY_EMAIL }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}
          WHATSAPP_TEST_NUMBER: ${{ secrets.WHATSAPP_TEST_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_CRISP_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_CRISP_WEBSITE_ID }}
          NEXT_PUBLIC_WHATSAPP_PHONE: ${{ secrets.NEXT_PUBLIC_WHATSAPP_PHONE }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          NEXT_PUBLIC_WHATSAPP_DEFAULT_MESSAGE: ${{ secrets.NEXT_PUBLIC_WHATSAPP_DEFAULT_MESSAGE }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

      - name: Check .next exists
        run: |
          echo "Listing .next folder:"
          ls -la .next/
          echo "Listing .next/static:"
          ls -la .next/static/ || echo "No static folder"
          echo "Listing .next/server:"
          ls -la .next/server/ || echo "No server folder"
          echo "Listing .next/standalone:"
          ls -la .next/standalone/ || echo "No standalone folder"

      - name: Deploy standalone server via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./.next/standalone/
          server-dir: moversehaste/
          dangerous-clean-slate: false

      - name: Deploy .next folder via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./.next/
          server-dir: moversehaste/.next/
          dangerous-clean-slate: true
          exclude: |
            **/cache/**
            **/standalone/**
          log-level: verbose

      - name: Deploy public folder via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: moversehaste/public/
          dangerous-clean-slate: false

      - name: Restart Node.js app via cPanel API
        run: |
          curl -s "https://s4.whitelabelclouds.com:2083/execute/NodeJS/restart_app" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            -d "domain=moversehaste.com"