name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          SANITY_API_VERSION: ${{ secrets.SANITY_API_VERSION }}
          USE_CMS: ${{ secrets.USE_CMS }}
          NEXT_PUBLIC_USE_CMS: ${{ secrets.NEXT_PUBLIC_USE_CMS }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          COMPANY_EMAIL: ${{ secrets.COMPANY_EMAIL }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}
          WHATSAPP_TEST_NUMBER: ${{ secrets.WHATSAPP_TEST_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_CRISP_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_CRISP_WEBSITE_ID }}
          NEXT_PUBLIC_WHATSAPP_PHONE: ${{ secrets.NEXT_PUBLIC_WHATSAPP_PHONE }}
          WHATSAPP_VERIFY_TOKEN: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
          NEXT_PUBLIC_WHATSAPP_DEFAULT_MESSAGE: ${{ secrets.NEXT_PUBLIC_WHATSAPP_DEFAULT_MESSAGE }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}

      - name: Deploy via cPanel API
        run: |
          curl -s "https://s4.whitelabelclouds.com:2083/execute/VersionControl/retrieve" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            | python3 -c "import sys,json; repos=json.load(sys.stdin)['data']; print(next(r['name'] for r in repos if 'moverse' in r['name'].lower()))" \
            > /tmp/reponame.txt
          
          REPO_NAME=$(cat /tmp/reponame.txt)
          
          curl -s "https://s4.whitelabelclouds.com:2083/execute/VersionControl/deploy" \
            -H "Authorization: cpanel ${{ secrets.CPANEL_USER }}:${{ secrets.CPANEL_API_TOKEN }}" \
            -d "repository_root=/home/moverseh/moversehaste"